[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Pure atomic unit tests with all dependencies mocked
    integration: Integration tests using the in-memory simulator

log_cli = true
log_cli_level = WARNING
log_cli_format = [%(levelname)-8s] %(name)s: %(message)s

addopts = -v --tb=short
